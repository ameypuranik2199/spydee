<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spydarr Web Tech | Cinematic Intro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #0d0d0d; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; }
        
        #stage { width: 800px; height: 400px; position: relative; }
        
        /* The Silk Thread */
        #thread { position: absolute; top: -500px; left: 50%; width: 2px; height: 600px; background: rgba(255,255,255,0.3); transform-origin: top center; }
        
        /* The Spider Body */
        #spider { position: absolute; bottom: -20px; left: -14px; width: 30px; height: 20px; background: #221F1F; border-radius: 50%; border: 1px solid #8B1E1E; }
        
        /* The Text */
        #brand-name { color: #8B1E1E; font-size: 3.5rem; letter-spacing: 5px; opacity: 0; filter: drop-shadow(0 0 10px #8B1E1E); text-transform: uppercase; }
        
        .web-line { position: absolute; background: #8B1E1E; opacity: 0.5; }
    </style>
</head>
<body>

<div id="stage">
    <div id="thread">
        <div id="spider"></div>
    </div>
    <h1 id="brand-name">Spydarr Webtech</h1>
</div>

<script>
    const tl = gsap.timeline();

    // 1. The Spider drops down from the top
    tl.to("#thread", { top: 0, duration: 2, ease: "bounce.out" });

    // 2. The Spider "swings" and the text weaves in
    tl.to("#thread", { 
        rotation: 15, 
        duration: 0.5, 
        repeat: 5, 
        yoyo: true, 
        ease: "sine.inOut" 
    });

    // 3. Characters appear one by one as if woven
    tl.to("#brand-name", {
        opacity: 1,
        duration: 2,
        onStart: () => {
            // Add a "glow" pulse effect
            gsap.to("#brand-name", { textShadow: "0 0 20px #ff0000", repeat: -1, yoyo: true });
        }
    }, "-=2");

    // 4. The Spider settles into position
    tl.to("#thread", { rotation: 0, duration: 1 });
    tl.to("#spider", { scale: 1.2, duration: 0.5, yoyo: true, repeat: 1 });
</script>

</body>
</html>
