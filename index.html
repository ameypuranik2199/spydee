<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spydarr Webtech | Smooth Animation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --brand-red: #8B1E1E;
            --silk-color: rgba(255, 255, 255, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, var(--bg-color) 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #brand-reveal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            opacity: 0;
        }

        .brand-text {
            color: var(--brand-red);
            font-size: 5rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(139, 30, 30, 0.8);
            margin: 0;
        }

        /* Stylized Childish Spider */
        #spider-node {
            position: absolute;
            width: 40px;
            height: 30px;
            background: #111;
            border-radius: 50%;
            border: 2px solid var(--brand-red);
            z-index: 3;
            transform: translate(-50%, -50%);
        }

        .eye {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 6px;
        }
        .eye.left { left: 8px; }
        .eye.right { right: 8px; }

        .leg {
            position: absolute;
            width: 15px;
            height: 2px;
            background: #111;
            border: 1px solid var(--brand-red);
        }
    </style>
</head>
<body>

<div id="container">
    <canvas id="webCanvas"></canvas>
    
    <div id="brand-reveal">
        <h1 class="brand-text">SPYDARR</h1>
        <h1 class="brand-text" style="font-size: 2.5rem; letter-spacing: 5px;">WEBTECH</h1>
    </div>

    <div id="spider-node">
        <div class="eye left"></div>
        <div class="eye right"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('webCanvas');
    const ctx = canvas.getContext('2d');
    const spider = document.getElementById('spider-node');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let spiderPos = { x: window.innerWidth / 2, y: -50 };
    let webLines = [];

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw the vertical thread the spider hangs from
        ctx.beginPath();
        ctx.moveTo(window.innerWidth / 2, 0);
        ctx.lineTo(spiderPos.x, spiderPos.y);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = 1;
        ctx.stroke();

        // Draw the woven web structure
        ctx.beginPath();
        ctx.strokeStyle = "rgba(139, 30, 30, 0.4)";
        ctx.lineWidth = 1.5;
        webLines.forEach((line, i) => {
            if (i === 0) ctx.moveTo(line.x, line.y);
            else ctx.lineTo(line.x, line.y);
        });
        ctx.stroke();

        // Update CSS Spider position
        spider.style.left = spiderPos.x + 'px';
        spider.style.top = spiderPos.y + 'px';
        
        requestAnimationFrame(animate);
    }

    const tl = gsap.timeline({ onComplete: () => {
        gsap.to(spider, { opacity: 0, duration: 0.5 });
    }});

    // Phase 1: Smooth Drop
    tl.to(spiderPos, { 
        y: window.innerHeight / 2, 
        duration: 2, 
        ease: "elastic.out(1, 0.5)" 
    });

    // Phase 2: Circular "Classic" Web Weaving
    const points = 16;
    const radius = 200;
    for (let i = 0; i <= points; i++) {
        let angle = (i / points) * Math.PI * 4; // Two rotations
        let r = (i / points) * radius;
        tl.to(spiderPos, {
            x: window.innerWidth / 2 + Math.cos(angle) * r,
            y: window.innerHeight / 2 + Math.sin(angle) * r,
            duration: 0.2,
            ease: "sine.inOut",
            onStart: () => webLines.push({ x: spiderPos.x, y: spiderPos.y })
        });
    }

    // Phase 3: Brand Reveal
    tl.to("#brand-reveal", { 
        opacity: 1, 
        scale: 1.1, 
        duration: 1.5, 
        ease: "power2.out" 
    });

    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
